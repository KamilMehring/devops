services:
  nginx:
    build:
      context: ./frontend
      args:
        NGINX_VERSION: v3
    image: ${DOCKERHUB_USER}/product-dashboard-frontend:v3
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${APP_PORT}:80"
    networks:
      - front-net
      - back-net

  backend:
    build:
      context: ./backend
      args:
        IMAGE_VERSION: v3
    image: ${DOCKERHUB_USER}/product-dashboard-backend:v3
    environment:
      NODE_ENV: production
      PORT: 3000
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?isrequired}
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://cache:6379
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - back-net

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - back-net

  cache:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - back-net

  db-seed:
    image: postgres:16-alpine
    profiles:
      - tools
    networks:
      - back-net
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command: >
      sh -c "psql -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c \"CREATE TABLE IF NOT EXISTS products (id SERIAL PRIMARY KEY, name TEXT NOT NULL, price NUMERIC(10,2) NOT NULL DEFAULT 0); INSERT INTO products (name, price) VALUES ('Widget', 9.99), ('Gadget', 24.99), ('Doohickey', 4.49);\""
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg-data:

networks:
  front-net:
    driver: bridge
  back-net:
    driver: bridge