<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Dashboard - Produkty</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header>
    <h1>Product Dashboard</h1>
    <nav>
      <a href="/index.html">Start</a>
      <a href="/products.html" class="active">Produkty</a>
      <a href="/stats.html">Statystyki</a>
    </nav>
  </header>

  <main class="container">
    <section class="grid-2">
      <section class="card">
        <h2>Dodaj produkt</h2>
        <form id="product-form">
          <label for="name">Nazwa</label>
          <input id="name" name="name" type="text" required placeholder="np. Monitor 27&quot;" />

          <label for="price">Cena</label>
          <input id="price" name="price" type="number" min="0" step="0.01" required placeholder="np. 999.99" />

          <button type="submit">Dodaj</button>
        </form>
        <p id="form-message" class="message"></p>
      </section>

      <section class="card">
        <h2>Lista produktów</h2>
        <button id="refresh-btn" class="secondary">Odśwież listę</button>
        <ul id="products-list" class="list"></ul>
      </section>
    </section>
  </main>

  <script src="/js/products.js"></script>
</body>
</html>
