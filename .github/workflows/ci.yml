name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: '20'
  APP_PATH: product-dashboard-prodreq/backend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-app
        with:
          node-version: ${{ env.NODE_VERSION }}
          app-path: ${{ env.APP_PATH }}

      - name: Run lint
        working-directory: ${{ env.APP_PATH }}
        run: npm run lint

  test:
    name: Tests (Node ${{ matrix.node-version }})
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-app
        with:
          node-version: ${{ matrix.node-version }}
          app-path: ${{ env.APP_PATH }}

      - name: Run unit tests
        working-directory: ${{ env.APP_PATH }}
        run: |
          set -o pipefail
          npm test | tee test-report-node-${{ matrix.node-version }}.txt

      - name: Upload test artifact for Node 20
        if: ${{ always() && matrix.node-version == 20 }}
        uses: actions/upload-artifact@v4
        with:
          name: test-report-node-20
          path: product-dashboard-prodreq/backend/test-report-node-20.txt
          retention-days: 7

      - name: Add unit test summary
        if: always()
        run: |
          echo "## Unit tests summary" >> $GITHUB_STEP_SUMMARY
          echo "- Node version: ${{ matrix.node-version }}" >> $GITHUB_STEP_SUMMARY
          echo "- Report: test-report-node-${{ matrix.node-version }}.txt" >> $GITHUB_STEP_SUMMARY

  test-integration:
    name: Integration tests
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 10s
          --health-retries 5
          --health-timeout 5s

    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: testuser
      PGPASSWORD: testpass
      PGDATABASE: testdb
      DATABASE_URL: postgres://testuser:testpass@127.0.0.1:5432/testdb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-app
        with:
          node-version: ${{ env.NODE_VERSION }}
          app-path: ${{ env.APP_PATH }}

      - name: Run integration tests
        working-directory: ${{ env.APP_PATH }}
        run: npm run test:integration

      - name: Write integration failure summary
        if: failure()
        run: |
          echo "## Integration tests failed" >> $GITHUB_STEP_SUMMARY
          echo "- PostgreSQL service container did not pass tests." >> $GITHUB_STEP_SUMMARY

  build-and-push:
    name: Build and push image
    needs: test-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/product-api
      PLATFORMS: linux/amd64,linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup backend
        uses: ./.github/actions/setup-app
        with:
          node-version: ${{ env.NODE_VERSION }}
          app-path: ${{ env.APP_PATH }}

      - name: Run app build
        working-directory: ${{ env.APP_PATH }}
        run: npm run build

      - name: Save build start time
        id: timer_start
        run: echo "ts=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        id: buildpush
        uses: docker/build-push-action@v5
        with:
          context: ./product-dashboard-prodreq/backend
          file: ./product-dashboard-prodreq/backend/Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Inspect manifest list
        run: docker buildx imagetools inspect ${{ env.IMAGE_NAME }}:latest | tee imagetools.txt

      - name: Save build duration
        id: timer_end
        run: echo "duration=$(( $(date +%s) - ${{ steps.timer_start.outputs.ts }} ))" >> $GITHUB_OUTPUT

      - name: Write failure summary
        if: failure()
        run: |
          echo "## Build and push failed" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Expected platforms: ${{ env.PLATFORMS }}" >> $GITHUB_STEP_SUMMARY

      - name: Write build summary
        if: always()
        run: |
          echo "## Docker build summary" >> $GITHUB_STEP_SUMMARY
          echo "- Image: ${{ env.IMAGE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- Platforms: ${{ env.PLATFORMS }}" >> $GITHUB_STEP_SUMMARY
          echo "- Build duration (s): ${{ steps.timer_end.outputs.duration }}" >> $GITHUB_STEP_SUMMARY
          echo "- Tags:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY